# Docker Compose – MySQL + Laravel API
# API: http://localhost:8000 (Register, Login, Products, Orders)
# Laravel runs from backend/ so vendor and paths are correct.

services:
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel-api
    restart: unless-stopped
    command: sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    environment:
      # Set APP_KEY in backend/.env or here for Docker; required for Laravel
      APP_KEY: ${APP_KEY:-base64:2flKtvk6g2sF7KqL9vH8xYz1aB3cD4eF5gH6iJ7kL8mN9oP0qR=}
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: observability_db
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - observability_network

  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: observability_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - observability_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - laravel
    networks:
      - observability_network


volumes:
  mysql_data:

networks:
  observability_network:
    driver: bridge
