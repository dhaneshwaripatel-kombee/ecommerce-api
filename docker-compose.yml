# Docker Compose – MySQL for Laravel backend
# Laravel .env should use:
#   DB_HOST=mysql
#   DB_PORT=3306
#   DB_DATABASE=observability_db
#   DB_USERNAME=app_user
#   DB_PASSWORD=app_password

services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: observability_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - observability_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:

networks:
  observability_network:
    driver: bridge
