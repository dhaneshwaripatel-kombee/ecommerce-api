# Promtail configuration - collect Docker container logs, push to Loki
# Labels: service, container_name, log_level (from JSON where possible)
# Docker log path: /var/lib/docker/containers/<id>/<id>-json.log

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: default

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: /var/lib/docker/containers/$1/$1-json.log
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container_name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: service
        replacement: $1
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: '(.+)'
        target_label: service
        replacement: $1
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
      - json:
          expressions:
            level: level
            severity: severity
            message: message
          source: log
      - template:
          source: log_level
          template: '{{ or .level .severity "unknown" | ToLower }}'
      - labels:
          log_level:
      - labelallow:
          - container_name
          - service
          - log_level
